name: Run ETL Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas google-cloud-bigquery python-dotenv gcsfs pyarrow db-dtypes functions-framework

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}



    - name: Deploy to Cloud Functions
      id: deploy
      uses: google-github-actions/deploy-cloud-functions@v3
      with:
        name: localiza-etl-pipeline
        runtime: python311
        region: us-east1
        source_dir: ./src
        entry_point: run_etl_cf
